# 主内容区域
mainSections:
  - post

featuredImageField: "image"
rssFullContent: true

favicon: "img/avatar.png"

# 网站描述
description: "Dan_Zai 的个人博客，分享技术笔记、开源项目、生活随笔和 AI 开发心得"

# 博客起始日期（用于统计页面计算博客时长）
blogStartDate: "2021-06-01"

# 日期格式
dateFormat:
  published: "2006-01-02"
  lastUpdated: "2006-01-02"

# 侧边栏配置
sidebar:
  emoji: "🌸"
  subtitle: "Dan_Zai | 中之我"
  avatar: "img/avatar.png"
  compact: false

# 文章配置
article:
  headingAnchor: true
  math: false
  toc: true
  readingTime: true
  list:
    showTags: true
  license:
    enabled: true
    default: "Licensed under CC BY-NC-SA 4.0"

# 首页小组件
widgets:
  homepage:
    - type: search
    - type: archives
      params:
        limit: 5
    - type: categories
      params:
        limit: 10
    - type: tag-cloud
      params:
        limit: 10
  page:
    - type: toc

# 图片处理
imageProcessing:
  cover:
    enabled: true
  content:
    enabled: true

# 主题配置
colorScheme:
  toggle: true
  default: "auto"

# 评论配置
comments:
  enabled: true
  provider: "giscus"

  giscus:
    repo: "DanZai233/DanZai233.github.io"
    repoID: "R_kgDOK0SZtw"
    category: "General"
    categoryID: "DIC_kwDOK0SZt84C3LU2"
    mapping: "pathname"
    lightTheme: "light"
    darkTheme: "dark_dimmed"
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: "top"
    lang: "zh-CN"
    strict: 0
    loading: "lazy"

# 页脚
footer:
  since: 2021
  customText: "Powered by <a href=\"https://gohugo.io/\" target=\"_blank\">Hugo</a> & <a href=\"https://github.com/CaiJimmy/hugo-theme-stack\" target=\"_blank\">Stack</a>"
